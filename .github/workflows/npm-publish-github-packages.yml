# This workflow will build a Node.js application and serve static HTML files
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: delivering node application

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: npm install  # Changed from npm ci to npm install
      
      - name: Build application
        run: npm run build || echo "No build script found, skipping build"
      
      - name: List files (debug)
        run: ls -la
      
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: .  # Upload all files since it's a static HTML site
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'

  publish-gpr:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://npm.pkg.github.com/
      
      - name: Install dependencies
        run: npm install  # Changed from npm ci to npm install
      
      - name: Build application
        run: npm run build || echo "No build script found"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to GitHub Packages
        run: npm publish || echo "No package to publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
